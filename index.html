<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>L I F E — a life planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600;1,700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: oklch(0.30 0.035 158);
    background:
      radial-gradient(1100px 760px at 16% -6%, oklch(0.42 0.09 165 / 0.55), transparent 60%),
      radial-gradient(1000px 820px at 92% 22%, oklch(0.40 0.08 202 / 0.45), transparent 60%),
      radial-gradient(900px 900px at 60% 108%, oklch(0.44 0.09 150 / 0.4), transparent 60%),
      oklch(0.19 0.035 162);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: oklch(0.52 0.11 158); text-decoration: none; }
  a:hover { color: oklch(0.42 0.11 160); }
  input, select, button { font-family: inherit; }
  input::placeholder { color: oklch(0.62 0.02 158); }
  .lc-scroll::-webkit-scrollbar { width: 7px; }
  .lc-scroll::-webkit-scrollbar-thumb { background: oklch(0.82 0.04 158); border-radius: 999px; }
  input[type="range"] { accent-color: oklch(0.62 0.13 160); }

  /* ---- login gate ---- */
  #login {
    min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 24px;
  }
  #login .card {
    width: 100%; max-width: 400px; background: oklch(0.965 0.014 150);
    border: 1px solid oklch(0.9 0.02 152); border-radius: 26px; padding: 40px 34px;
    box-shadow: 0 40px 90px -50px oklch(0.1 0.05 160 / 0.9); text-align: center;
  }
  #login .brand {
    font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 38px;
    letter-spacing: 0.34em; text-indent: 0.34em; color: oklch(0.3 0.07 162);
  }
  #login .tag {
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.16em;
    color: oklch(0.5 0.09 165); text-transform: uppercase; margin-top: 6px;
  }
  #login .lede {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px;
    color: oklch(0.5 0.05 158); margin: 22px 0 20px;
  }
  #login input {
    width: 100%; padding: 13px 16px; border-radius: 12px; border: 1px solid oklch(0.88 0.03 152);
    background: oklch(0.99 0.006 150); font-size: 15px; outline: none; margin-bottom: 12px;
  }
  #login button {
    width: 100%; padding: 13px 0; border-radius: 12px; border: none; cursor: pointer;
    color: oklch(0.2 0.05 160); font-size: 14px; font-weight: 700;
    background: oklch(0.86 0.13 168);
  }
  #login button:disabled { opacity: 0.6; cursor: default; }
  #login .msg {
    font-family: 'Space Mono', monospace; font-size: 11.5px; color: oklch(0.5 0.06 158);
    margin-top: 14px; min-height: 16px;
  }

  /* ---- signed-in pill ---- */
  #user-pill {
    position: fixed; top: 16px; right: 18px; z-index: 40; display: none; align-items: center; gap: 10px;
    padding: 7px 8px 7px 14px; border-radius: 999px; background: oklch(0.98 0.02 150 / 0.14);
    border: 1px solid oklch(0.8 0.1 168 / 0.3); backdrop-filter: blur(6px);
  }
  #user-pill #user-email {
    font-family: 'Space Mono', monospace; font-size: 11px; color: oklch(0.95 0.03 150); max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #user-pill button {
    cursor: pointer; border: none; border-radius: 999px; padding: 6px 12px; font-size: 11px; font-weight: 700;
    background: oklch(0.86 0.13 168); color: oklch(0.2 0.05 160);
  }

  /* ---- responsive layout (overrides the template's inline styles) ---- */
  .app-outer { max-width: 1560px !important; }

  @media (max-width: 1100px) {
    .app-outer { padding: 18px 12px !important; }
    .app-main { padding: 20px 16px !important; }
  }

  /* tablet / phone: sidebar becomes a top nav bar, columns stack */
  @media (max-width: 900px) {
    .app-shell { display: flex !important; flex-direction: column; }
    .app-sidebar {
      flex-direction: row !important; align-items: center !important;
      gap: 10px !important; padding: 10px 12px !important;
      overflow-x: auto; scrollbar-width: none;
    }
    .app-sidebar::-webkit-scrollbar { display: none; }
    .app-brand { display: none !important; }
    .side-today { display: none !important; }
    .app-nav { flex-direction: row !important; gap: 6px !important; }
    .app-nav > div { white-space: nowrap; padding: 8px 11px !important; font-size: 13px !important; }
    .grid-2 { grid-template-columns: 1fr !important; }
    .grid-4 { grid-template-columns: 1fr 1fr !important; }
    .cal-card { overflow-x: auto; }
    .cal-grid { min-width: 620px; }
  }

  @media (max-width: 560px) {
    .app-outer { padding: 10px 6px !important; }
    .app-main { padding: 14px 10px !important; gap: 14px !important; }
    .grid-4 { grid-template-columns: 1fr !important; }
    #user-pill { top: auto; bottom: 10px; right: 10px; }
    #user-pill #user-email { max-width: 110px; }
  }
</style>
</head>
<body>

  <!-- login gate -->
  <div id="login">
    <div class="card">
      <div class="brand">L I F E</div>
      <div class="tag">a life planner</div>
      <div class="lede">personality dictates destiny.</div>
      <input id="login-username" type="text" placeholder="username" autocomplete="username" autocapitalize="none" autocorrect="off">
      <input id="login-password" type="password" placeholder="password" autocomplete="current-password">
      <button id="login-btn">Sign in</button>
      <div id="login-msg" class="msg"></div>
    </div>
  </div>

  <!-- signed-in indicator -->
  <div id="user-pill">
    <span id="user-email"></span>
    <button id="signout-btn">Sign out</button>
  </div>

  <!-- dashboard mounts here -->
  <div id="app-wrap" style="display:none;"><div id="app"></div></div>

  <!-- original Claude Design template, rendered by runtime.js -->
  <template id="app-template"><div class="app-outer" style="max-width:1340px; margin:0 auto; padding:34px 26px;">
  <div class="app-shell" style="display:grid; grid-template-columns:210px minmax(0,1fr); background:oklch(0.965 0.014 150); border:1px solid oklch(0.9 0.02 152); border-radius:26px; overflow:hidden; box-shadow:0 40px 90px -50px oklch(0.1 0.05 160 / 0.9); min-height:760px;">

    <!-- sidebar -->
    <div class="app-sidebar" style="background:linear-gradient(180deg, oklch(0.3 0.07 162), oklch(0.24 0.06 182)); padding:26px 18px; display:flex; flex-direction:column; gap:26px; color:oklch(0.95 0.02 150);">
      <div class="app-brand">
        <div style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:30px; letter-spacing:0.34em; text-indent:0.34em;">L I F E</div>
        <div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.16em; color:oklch(0.82 0.08 165); text-transform:uppercase; margin-top:4px;">a life planner</div>
      </div>
      <div class="app-nav" style="display:flex; flex-direction:column; gap:5px;">
        <sc-for list="{{ navSide }}" as="n" hint-placeholder-count="6">
          <div onClick="{{ n.go }}" style="display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:11px; font-weight:600; font-size:14px; cursor:pointer; color:{{ n.color }}; background:{{ n.bg }};">
            <span style="font-size:16px;">{{ n.emoji }}</span>{{ n.label }}
          </div>
        </sc-for>
      </div>
      <div class="side-today" style="margin-top:auto; padding:14px; border-radius:14px; background:oklch(0.98 0.02 150 / 0.1); border:1px solid oklch(0.8 0.1 168 / 0.25);">
        <div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.12em; color:oklch(0.84 0.08 165); text-transform:uppercase;">today</div>
        <div style="font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600;">{{ doneLabel }} done</div>
      </div>
    </div>

    <!-- main -->
    <div class="app-main" style="padding:28px; display:flex; flex-direction:column; gap:20px;">

      <!-- header -->
      <div>
        <div style="font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.18em; color:oklch(0.5 0.06 158); text-transform:uppercase;">{{ todayLabel }}</div>
        <div style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:34px; color:oklch(0.3 0.05 158); margin-top:2px;">{{ greeting }}, {{ name }}.</div>
        <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:17px; color:oklch(0.5 0.05 158);">personality dictates destiny.</div>
      </div>

      <!-- ============ HOME ============ -->
      <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex; flex-direction:column; gap:20px;">
        <div class="grid-2" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;">
          <!-- daily card -->
          <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:22px; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
              <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:22px; letter-spacing:0.22em; color:oklch(0.4 0.1 158); margin:0; white-space:nowrap;">🍃 d a i l y</p>
              <span style="font-family:'Space Mono',monospace; font-size:12px; color:oklch(0.5 0.05 158);">{{ dailyDoneLabel }}</span>
            </div>
            <div class="lc-scroll" style="display:flex; flex-direction:column; gap:8px; max-height:480px; overflow-y:auto; padding-right:4px;">
              <sc-for list="{{ todayDailyTasks }}" as="t" hint-placeholder-count="1">
                <div style="display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:12px; background:oklch(0.975 0.01 150); border:1px solid oklch(0.92 0.016 152);">
                  <span onClick="{{ t.toggle }}" style="flex:0 0 auto; width:20px; height:20px; border-radius:7px; cursor:pointer; border:1.5px solid {{ t.boxBorder }}; background:{{ t.boxBg }}; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;">{{ t.check }}</span>
                  <span onClick="{{ t.toggle }}" style="flex:1; cursor:pointer; font-weight:600; font-size:14.5px; color:{{ t.textColor }}; text-decoration:{{ t.strike }};">{{ t.title }}</span>
                  <span style="font-size:12px; color:oklch(0.56 0.03 158);">{{ t.whatToDo }}</span>
                  <span onClick="{{ t.remove }}" style="cursor:pointer; color:oklch(0.66 0.03 158); font-size:13px;">✕</span>
                </div>
              </sc-for>
              <sc-if value="{{ noDailyToday }}" hint-placeholder-val="{{ false }}">
                <div style="text-align:center; padding:18px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:oklch(0.58 0.03 158);">no daily habits today — add them in Daily 🍃</div>
              </sc-if>
            </div>
          </div>
          <!-- today card -->
          <div style="background:oklch(0.95 0.03 150); border:1px solid oklch(0.86 0.045 152); border-radius:18px; padding:22px; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
              <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:22px; letter-spacing:0.24em; color:oklch(0.4 0.1 158); margin:0; white-space:nowrap;">🍀 t o d a y</p>
              <span style="font-family:'Space Mono',monospace; font-size:12px; color:oklch(0.5 0.05 158);">{{ oneoffDoneLabel }}</span>
            </div>
            <div class="lc-scroll" style="display:flex; flex-direction:column; gap:8px; max-height:432px; overflow-y:auto; padding-right:4px;">
              <sc-for list="{{ todayOneoffTasks }}" as="t" hint-placeholder-count="2">
                <div style="display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:12px; background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152);">
                  <span onClick="{{ t.toggle }}" style="flex:0 0 auto; width:20px; height:20px; border-radius:7px; cursor:pointer; border:1.5px solid {{ t.boxBorder }}; background:{{ t.boxBg }}; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;">{{ t.check }}</span>
                  <span onClick="{{ t.toggle }}" style="flex:1; cursor:pointer; font-weight:600; font-size:14.5px; color:{{ t.textColor }}; text-decoration:{{ t.strike }};">{{ t.title }}</span>
                  <span onClick="{{ t.remove }}" style="cursor:pointer; color:oklch(0.66 0.03 158); font-size:13px;">✕</span>
                </div>
              </sc-for>
              <sc-if value="{{ noOneoffToday }}" hint-placeholder-val="{{ false }}">
                <div style="text-align:center; padding:18px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:oklch(0.58 0.03 158);">nothing one-off today — add below 🌱</div>
              </sc-if>
            </div>
            <input type="text" placeholder="+ add a task for today…  (Enter)" onKeyDown="{{ onAddTaskToday }}" style="margin-top:12px; width:100%; padding:11px 14px; border-radius:12px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.99 0.006 150); font-size:14px; outline:none;">
          </div>
        </div>

        <div class="grid-4" style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; align-items:start;">
          <!-- weight -->
          <div style="background:oklch(0.95 0.03 150); border:1px solid oklch(0.86 0.045 152); border-radius:18px; padding:20px; display:flex; flex-direction:column;">
            <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:16px; letter-spacing:0.2em; color:oklch(0.4 0.1 158); margin:0 0 12px; white-space:nowrap;">🍃 w e i g h t</p>
            <div style="display:flex; align-items:baseline; gap:8px;">
              <span style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:36px; line-height:1; color:oklch(0.3 0.05 158);">{{ weightLatest }}</span>
              <span style="font-family:'Space Mono',monospace; font-size:12px; color:oklch(0.56 0.03 158);">{{ weightUnit }}</span>
              <span style="font-family:'Space Mono',monospace; font-size:12px; margin-left:auto; color:{{ weightDeltaColor }};">{{ weightDelta }}</span>
            </div>
            <sc-if value="{{ weightHasLine }}" hint-placeholder-val="{{ false }}">
              <svg viewBox="0 0 240 56" style="width:100%; height:auto; margin-top:12px; display:block;"><polyline points="{{ weightLine }}" fill="none" stroke="oklch(0.58 0.12 165)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>
            </sc-if>
            <input type="number" step="0.1" placeholder="+ log today…" onKeyDown="{{ onAddWeight }}" style="margin-top:14px; width:100%; padding:10px 13px; border-radius:12px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.99 0.006 150); font-size:13px; outline:none;">
          </div>
          <!-- leetcode metric -->
          <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:20px; display:flex; flex-direction:column; align-items:center;">
            <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:16px; letter-spacing:0.18em; color:oklch(0.4 0.1 158); margin:0 0 12px; align-self:flex-start; white-space:nowrap;">✦ l e e t c o d e</p>
            <div style="position:relative; width:92px; height:92px;">
              <div style="width:92px; height:92px; border-radius:50%; background:{{ donutBg }}; -webkit-mask:radial-gradient(circle, transparent 55%, #000 56%); mask:radial-gradient(circle, transparent 55%, #000 56%);"></div>
              <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                <div style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:26px; line-height:1;">{{ leetTotal }}</div>
                <div style="font-family:'Space Mono',monospace; font-size:8px; letter-spacing:0.08em; color:oklch(0.58 0.03 158); text-transform:uppercase;">solved</div>
              </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:12px;">
              <sc-for list="{{ leetLegend }}" as="g" hint-placeholder-count="3">
                <div style="display:flex; align-items:center; gap:5px;"><span style="width:8px; height:8px; border-radius:3px; background:{{ g.color }};"></span><span style="font-family:'Space Mono',monospace; font-size:11px;">{{ g.count }}</span></div>
              </sc-for>
            </div>
            <div style="margin-top:10px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13.5px; color:oklch(0.44 0.06 158);">{{ leetWeekLabel }}</div>
          </div>
          <!-- applications metric -->
          <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:20px;">
            <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:16px; letter-spacing:0.18em; color:oklch(0.4 0.1 158); margin:0 0 10px; white-space:nowrap;">🌾 a p p l i c a t i o n s</p>
            <div style="display:flex; align-items:baseline; gap:8px;">
              <span style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:36px; line-height:1; color:oklch(0.3 0.05 158);">{{ appsTotal }}</span>
              <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.56 0.03 158); text-transform:uppercase;">total</span>
            </div>
            <div style="display:flex; gap:14px; margin:8px 0 12px;">
              <span style="font-family:'Space Mono',monospace; font-size:11px; color:oklch(0.5 0.09 165);">● {{ appsActive }} active</span>
              <span style="font-family:'Space Mono',monospace; font-size:11px; color:oklch(0.55 0.13 145);">● {{ appsOffers }} offers</span>
            </div>
            <div style="display:flex; align-items:flex-end; gap:5px; height:52px;">
              <sc-for list="{{ pipeline }}" as="s" hint-placeholder-count="6">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:3px;">
                  <div style="width:100%; height:{{ s.barH }}; min-height:4px; border-radius:4px 4px 2px 2px; background:{{ s.color }};"></div>
                </div>
              </sc-for>
            </div>
          </div>
          <!-- book chapters metric -->
          <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:20px;">
            <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:16px; letter-spacing:0.14em; color:oklch(0.4 0.1 158); margin:0 0 10px; white-space:nowrap;">🪴 b o o k s</p>
            <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:12px;">
              <span style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:36px; line-height:1; color:oklch(0.3 0.05 158);">{{ booksAvgLabel }}</span>
              <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.56 0.03 158); text-transform:uppercase;">avg progress</span>
            </div>
            <div style="display:flex; flex-direction:column; gap:9px;">
              <sc-for list="{{ sysBooks }}" as="b" hint-placeholder-count="3">
                <div>
                  <div style="display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:3px;"><span style="font-weight:500; color:oklch(0.38 0.03 158);">{{ b.title }}</span><span style="font-family:'Space Mono',monospace; color:oklch(0.56 0.03 158);">{{ b.pctLabel }}</span></div>
                  <div style="height:6px; border-radius:999px; background:oklch(0.92 0.02 152); overflow:hidden;"><div style="height:100%; width:{{ b.pctLabel }}; border-radius:999px; background:linear-gradient(90deg, oklch(0.72 0.12 165), oklch(0.62 0.12 178));"></div></div>
                </div>
              </sc-for>
            </div>
          </div>
        </div>
      </div>
      </sc-if>

      <!-- ============ CALENDAR (week time-grid) ============ -->
      <sc-if value="{{ isCal }}" hint-placeholder-val="{{ false }}">
      <div class="cal-card" style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <div style="display:flex; align-items:baseline; gap:12px;">
            <p style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:26px; color:oklch(0.3 0.05 158); margin:0;">{{ calMonthName }}</p>
            <span style="font-family:'Space Mono',monospace; font-size:13px; color:oklch(0.56 0.03 158);">{{ calYear }}</span>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span onClick="{{ thisWeek }}" style="cursor:pointer; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.04em; padding:7px 12px; border-radius:9px; background:oklch(0.94 0.02 152); color:oklch(0.4 0.05 158);">today</span>
            <span onClick="{{ prevWeek }}" style="cursor:pointer; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:9px; background:oklch(0.94 0.02 152); font-size:18px; color:oklch(0.4 0.05 158);">‹</span>
            <span onClick="{{ nextWeek }}" style="cursor:pointer; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:9px; background:oklch(0.94 0.02 152); font-size:18px; color:oklch(0.4 0.05 158);">›</span>
          </div>
        </div>

        <!-- add event -->
        <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; padding:12px; border-radius:12px; background:oklch(0.975 0.01 150); border:1px solid oklch(0.92 0.016 152);">

          <input data-ev-end type="time" value="10:00" style="padding:9px 10px; border-radius:9px; border:1px solid oklch(0.9 0.02 152); background:oklch(0.99 0.006 150); font-size:13px; outline:none;">

        <!-- day headers -->
        <div class="cal-grid" style="display:grid; grid-template-columns:54px repeat(7,1fr); gap:0;">
          <div></div>
          <sc-for list="{{ weekDays }}" as="wd" hint-placeholder-count="7">
            <div style="text-align:center; padding:6px 0 10px;">
              <div style="font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.06em; color:oklch(0.58 0.03 158); text-transform:uppercase;">{{ wd.dow }}</div>
              <div style="margin:4px auto 0; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:50%; font-weight:700; font-size:14px; color:{{ wd.numColor }}; background:{{ wd.numBg }};">{{ wd.num }}</div>
            </div>
          </sc-for>
        </div>

        <!-- all-day row -->
        <div class="cal-grid" style="display:grid; grid-template-columns:54px repeat(7,1fr); border-top:1px solid oklch(0.92 0.016 152); border-bottom:1px solid oklch(0.92 0.016 152);">
          <div style="display:flex; align-items:center; justify-content:flex-end; padding-right:8px; font-family:'Space Mono',monospace; font-size:9px; color:oklch(0.6 0.03 158); text-transform:uppercase;">all-day</div>

                <div style="display:flex; align-items:center; gap:4px; font-size:10px; padding:2px 6px; border-radius:5px; background:{{ ad.bg }}; color:{{ ad.color }};">
                  <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ ad.text }}</span>
                  <sc-if value="{{ ad.canRemove }}" hint-placeholder-val="{{ false }}">
                    <span onClick="{{ ad.remove }}" style="cursor:pointer; opacity:0.7;">✕</span>
                  </sc-if>
                </div>
              </sc-for>
            </div>
          </sc-for>
        </div>

        <!-- time grid -->
        <div class="lc-scroll" style="max-height:600px; overflow-y:auto; margin-top:0;">
          <div class="cal-grid" style="display:grid; grid-template-columns:54px repeat(7,1fr);">
            <!-- hour gutter -->
            <div style="position:relative; height:{{ gridHeightPx }};">
              <sc-for list="{{ hourLines }}" as="h" hint-placeholder-count="17">
                <div style="position:absolute; top:{{ h.top }}; right:8px; transform:translateY(-6px); font-family:'Space Mono',monospace; font-size:9.5px; color:oklch(0.6 0.03 158);">{{ h.label }}</div>
              </sc-for>
            </div>
            <!-- day columns -->
            <sc-for list="{{ dayColumns }}" as="col" hint-placeholder-count="7">
              <div style="position:relative; height:{{ gridHeightPx }}; border-left:1px solid oklch(0.94 0.014 152); background:repeating-linear-gradient(oklch(0.99 0.006 150) 0 53px, oklch(0.945 0.014 152) 53px 54px); background-color:{{ col.todayTint }};">
                <sc-for list="{{ col.events }}" as="ev" hint-placeholder-count="0">
                  <div style="position:absolute; top:{{ ev.top }}; height:{{ ev.height }}; left:3px; right:3px; border-radius:6px; padding:3px 6px; overflow:hidden; background:{{ ev.color }}; color:#fff; box-shadow:0 1px 2px oklch(0.2 0.05 160 / 0.2);">
                    <span onClick="{{ ev.remove }}" style="position:absolute; top:1px; right:3px; cursor:pointer; font-size:10px; opacity:0.85; line-height:1;">✕</span>

                  </div>
                </sc-for>
              </div>
            </sc-for>
          </div>
        </div>
      </div>
      </sc-if>

      <!-- ============ DAILY (routine / habits) ============ -->
      <sc-if value="{{ isDaily }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; flex-direction:column; gap:20px;">
        <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:22px;">
          <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:19px; letter-spacing:0.2em; color:oklch(0.4 0.1 158); margin:0 0 6px; white-space:nowrap;">🍃 d a i l y   r o u t i n e</p>
          <div style="font-size:12px; color:oklch(0.56 0.03 158); margin-bottom:14px;">active habits are auto-added to Today each morning</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <sc-for list="{{ routines }}" as="r" hint-placeholder-count="1">
              <div style="display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; background:oklch(0.975 0.01 150); border:1px solid oklch(0.92 0.016 152);">
                <span onClick="{{ r.toggle }}" title="active" style="flex:0 0 auto; width:19px; height:19px; border-radius:6px; cursor:pointer; border:1.5px solid {{ r.boxBorder }}; background:{{ r.boxBg }}; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px;">{{ r.check }}</span>
                <span style="flex:1; font-weight:600; font-size:15px; color:{{ r.nameColor }};">{{ r.name }}</span>
                <span style="font-size:13px; color:oklch(0.56 0.03 158);">{{ r.whatToDo }}</span>
                <span onClick="{{ r.remove }}" style="cursor:pointer; color:oklch(0.66 0.03 158); font-size:14px;">✕</span>
              </div>
            </sc-for>
          </div>
          <input type="text" placeholder="+ new habit…  (Enter)" onKeyDown="{{ onAddRoutine }}" style="margin-top:14px; width:100%; padding:11px 14px; border-radius:12px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.99 0.006 150); font-size:14px; outline:none;">
        </div>

        <div style="background:oklch(0.95 0.03 150); border:1px solid oklch(0.86 0.045 152); border-radius:18px; padding:22px;">
          <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:19px; letter-spacing:0.2em; color:oklch(0.4 0.1 158); margin:0 0 6px; white-space:nowrap;">🌾 o n e - o f f  ·  t o m o r r o w</p>
          <div style="font-size:12px; color:oklch(0.56 0.03 158); margin-bottom:14px;">upcoming one-off tasks — added for tomorrow, roll forward until done</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <sc-for list="{{ oneOffs }}" as="t" hint-placeholder-count="2">
              <div style="display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; background:oklch(0.975 0.01 150); border:1px solid oklch(0.92 0.016 152);">
                <span onClick="{{ t.toggle }}" style="flex:0 0 auto; width:19px; height:19px; border-radius:6px; cursor:pointer; border:1.5px solid {{ t.boxBorder }}; background:{{ t.boxBg }}; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px;">{{ t.check }}</span>
                <span style="flex:1; font-weight:600; font-size:15px; color:{{ t.textColor }}; text-decoration:{{ t.strike }};">{{ t.title }}</span>
                <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.5 0.05 158);">{{ t.dateLabel }}</span>
                <span onClick="{{ t.remove }}" style="cursor:pointer; color:oklch(0.66 0.03 158); font-size:14px;">✕</span>
              </div>
            </sc-for>
            <sc-if value="{{ noOneOffs }}" hint-placeholder-val="{{ false }}">
              <div style="text-align:center; padding:14px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:oklch(0.58 0.03 158);">no open one-offs — add one below 🌾</div>
            </sc-if>
          </div>
          <input type="text" placeholder="+ one-off (adds for tomorrow)…  (Enter)" onKeyDown="{{ onAddOneOff }}" style="margin-top:14px; width:100%; padding:11px 14px; border-radius:12px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.99 0.006 150); font-size:14px; outline:none;">
        </div>

        <div style="background:oklch(0.965 0.014 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:20px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:18px; letter-spacing:0.2em; color:oklch(0.4 0.1 158); margin:0; white-space:nowrap;">𝙖 𝙧 𝙘 𝙝 𝙞 𝙫 𝙚</p>
            <span style="font-family:'Space Mono',monospace; font-size:11px; color:oklch(0.5 0.05 158);">{{ archiveCount }} items</span>
          </div>
          <div class="lc-scroll" style="display:flex; flex-direction:column; gap:6px; max-height:210px; overflow-y:auto; padding-right:4px;">
            <sc-for list="{{ archive }}" as="t" hint-placeholder-count="3">
              <div style="display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:10px; background:oklch(0.99 0.006 150); border:1px solid oklch(0.93 0.014 152);">
                <span style="width:8px; height:8px; border-radius:50%; background:{{ t.dot }};"></span>
                <span style="flex:1; font-size:13px; color:oklch(0.5 0.03 158); text-decoration:{{ t.strike }};">{{ t.title }}</span>
                <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.58 0.03 158);">{{ t.outcome }}</span>
                <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.62 0.03 158);">{{ t.dateLabel }}</span>
              </div>
            </sc-for>
            <sc-if value="{{ noArchive }}" hint-placeholder-val="{{ false }}">
              <div style="text-align:center; padding:14px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:oklch(0.58 0.03 158);">history will collect here as days pass</div>
            </sc-if>
          </div>
        </div>
      </div>

      <!-- ============ LEETCODE ============ -->

        <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:22px;">
          <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:19px; letter-spacing:0.18em; color:oklch(0.4 0.1 158); margin:0 0 16px; white-space:nowrap;">🌱 l e e t c o d e</p>

                <div style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:34px; line-height:1;">{{ leetTotal }}</div>
                <div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.1em; color:oklch(0.58 0.03 158); text-transform:uppercase;">solved</div>

            <div style="flex:1; display:flex; flex-direction:column; gap:10px;">

              </sc-for>
            </div>
          </div>
          <div style="display:flex; gap:10px; margin-top:14px;">
            <div style="flex:1; text-align:center; padding:10px 6px; border-radius:12px; background:oklch(0.96 0.03 165);"><div style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:22px; color:oklch(0.42 0.1 160);">{{ leetTotal }}</div><div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.06em; color:oklch(0.5 0.05 158); text-transform:uppercase;">solved</div></div>
            <div style="flex:1; text-align:center; padding:10px 6px; border-radius:12px; background:oklch(0.95 0.04 40);"><div style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:22px; color:oklch(0.52 0.13 35);">{{ failedCount }}</div><div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.06em; color:oklch(0.5 0.05 158); text-transform:uppercase;">failed</div></div>
            <div style="flex:1; text-align:center; padding:10px 6px; border-radius:12px; background:oklch(0.95 0.03 205);"><div style="font-family:'Cormorant Garamond',serif; font-weight:600; font-size:22px; color:oklch(0.45 0.1 210);">{{ successLabel }}</div><div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.06em; color:oklch(0.5 0.05 158); text-transform:uppercase;">success</div></div>
          </div>
          <div style="margin-top:12px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:oklch(0.44 0.06 158);">{{ leetTodayLabel }}</div>
          <div style="margin-top:16px;">
            <input type="text" placeholder="problem name…" data-leet-input style="width:100%; padding:10px 13px; border-radius:12px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.99 0.006 150); font-size:13px; outline:none; margin-bottom:8px;">
            <input type="text" placeholder="💡 best way to solve… (hash map, two pointers, DP…)" data-leet-note style="width:100%; padding:10px 13px; border-radius:12px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.99 0.006 150); font-size:13px; outline:none; margin-bottom:10px;">
            <div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:oklch(0.5 0.09 160); margin-bottom:6px;">✓ save as solved</div>
            <div style="display:flex; gap:8px; margin-bottom:12px;">
              <sc-for list="{{ leetSolvedBtns }}" as="btn" hint-placeholder-count="3">
                <button onClick="{{ btn.add }}" style="flex:1; cursor:pointer; padding:9px 0; border-radius:10px; border:none; color:#fff; font-size:12px; font-weight:600; background:{{ btn.color }};">{{ btn.label }}</button>
              </sc-for>
            </div>
            <div style="font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:oklch(0.55 0.11 35); margin-bottom:6px;">✕ save as failed / to review</div>
            <div style="display:flex; gap:8px; margin-bottom:12px;">
              <sc-for list="{{ leetFailedBtns }}" as="btn" hint-placeholder-count="3">
                <button onClick="{{ btn.add }}" style="flex:1; cursor:pointer; padding:9px 0; border-radius:10px; border:1px solid oklch(0.84 0.08 40); background:oklch(0.97 0.02 40); color:oklch(0.5 0.12 35); font-size:12px; font-weight:600;">{{ btn.label }}</button>
              </sc-for>
            </div>
            <button onClick="{{ onLeetCancel }}" style="width:100%; cursor:pointer; padding:9px 0; border-radius:10px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.97 0.006 150); color:oklch(0.5 0.04 158); font-size:12px; font-weight:600;">Cancel / clear</button>
          </div>
        </div>
        <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:22px;">
          <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:18px; letter-spacing:0.16em; color:oklch(0.4 0.1 158); margin:0 0 12px; white-space:nowrap;">🍃 s o l v e d</p>
          <div class="lc-scroll" style="display:flex; flex-direction:column; gap:7px; max-height:230px; overflow-y:auto; padding-right:4px;">
            <sc-for list="{{ solvedList }}" as="s" hint-placeholder-count="1">

                  <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.56 0.03 158);">{{ s.difficulty }}</span>
                  <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.62 0.03 158);">{{ s.dateLabel }}</span>
                  <span onClick="{{ s.remove }}" style="cursor:pointer; color:oklch(0.66 0.03 158); font-size:13px;">✕</span>

              <div style="text-align:center; padding:16px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:oklch(0.58 0.03 158);">log your first solve on the left 🌱</div>
            </sc-if>
          </div>
          <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:18px; letter-spacing:0.16em; color:oklch(0.52 0.1 35); margin:18px 0 12px; white-space:nowrap;">🍂 f a i l e d  ·  r e v i e w</p>
          <div class="lc-scroll" style="display:flex; flex-direction:column; gap:7px; max-height:200px; overflow-y:auto; padding-right:4px;">
            <sc-for list="{{ failedList }}" as="s" hint-placeholder-count="1">
              <div style="display:flex; flex-direction:column; gap:7px; padding:10px 13px; border-radius:11px; background:oklch(0.98 0.02 40); border:1px solid oklch(0.9 0.04 40);">
                <div style="display:flex; align-items:center; gap:11px;">
                  <span style="width:9px; height:9px; border-radius:3px; background:{{ s.color }};"></span>
                  <span style="flex:1; font-weight:600; font-size:14px; color:oklch(0.4 0.06 35);">{{ s.name }}</span>
                  <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.56 0.03 158);">{{ s.difficulty }}</span>
                  <span style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.62 0.03 158);">{{ s.dateLabel }}</span>
                  <span onClick="{{ s.remove }}" style="cursor:pointer; color:oklch(0.66 0.03 158); font-size:13px;">✕</span>

                <input type="text" value="{{ s.note }}" onInput="{{ s.onNote }}" placeholder="💡 what to remember next time…" style="width:100%; padding:7px 10px; border-radius:8px; border:1px solid oklch(0.9 0.03 40); background:oklch(0.99 0.006 150); font-size:12px; color:oklch(0.4 0.06 35); outline:none;">
              </div>
            </sc-for>
            <sc-if value="{{ noFailed }}" hint-placeholder-val="{{ false }}">
              <div style="text-align:center; padding:14px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; color:oklch(0.6 0.03 158);">nothing to review — log missed attempts to revisit them</div>
            </sc-if>
          </div>
        </div>
      </div>
      </sc-if>

      <!-- ============ APPLICATIONS ============ -->
      <sc-if value="{{ isApps }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; flex-direction:column; gap:20px;">
        <div style="background:oklch(0.95 0.03 150); border:1px solid oklch(0.86 0.045 152); border-radius:18px; padding:20px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:19px; letter-spacing:0.22em; color:oklch(0.4 0.1 158); margin:0; white-space:nowrap;">🌾 a p p l i c a t i o n s</p>
            <span style="font-family:'Space Mono',monospace; font-size:11px; color:oklch(0.5 0.05 158);">click a stage chip to advance →</span>
          </div>
          <div style="overflow-x:auto;">
            <div style="min-width:720px; display:flex; flex-direction:column; gap:6px;">
              <div style="display:flex; align-items:center; gap:8px; padding:0 6px 4px; font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase; color:oklch(0.58 0.03 158);">
                <span style="flex:1.4; min-width:120px;">Company</span>
                <span style="flex:1.2; min-width:110px;">Role</span>
                <span style="width:96px; text-align:center;">Stage</span>
                <span style="flex:1; min-width:90px;">Link</span>
                <span style="width:130px;">Applied</span>
                <span style="flex:1.4; min-width:120px;">Notes</span>
                <span style="width:16px;"></span>
              </div>
              <sc-for list="{{ appRows }}" as="a" hint-placeholder-count="3">
                <div style="display:flex; align-items:center; gap:8px; padding:6px; border-radius:11px; background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152);">
                  <input value="{{ a.company }}" onInput="{{ a.onCompany }}" placeholder="Company" style="flex:1.4; min-width:120px; padding:8px 10px; border-radius:8px; border:1px solid oklch(0.92 0.016 152); background:oklch(0.985 0.006 150); font-size:13px; font-weight:600; outline:none;">
                  <input value="{{ a.role }}" onInput="{{ a.onRole }}" placeholder="Role" style="flex:1.2; min-width:110px; padding:8px 10px; border-radius:8px; border:1px solid oklch(0.92 0.016 152); background:oklch(0.985 0.006 150); font-size:13px; outline:none;">
                  <span onClick="{{ a.cycle }}" style="width:96px; text-align:center; cursor:pointer; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.03em; text-transform:uppercase; padding:6px 4px; border-radius:999px; color:#fff; background:{{ a.color }};">{{ a.status }}</span>
                  <input value="{{ a.link }}" onInput="{{ a.onLink }}" placeholder="url" style="flex:1; min-width:90px; padding:8px 10px; border-radius:8px; border:1px solid oklch(0.92 0.016 152); background:oklch(0.985 0.006 150); font-size:12px; outline:none;">
                  <input type="date" value="{{ a.appliedOn }}" onInput="{{ a.onApplied }}" style="width:130px; padding:7px 10px; border-radius:8px; border:1px solid oklch(0.92 0.016 152); background:oklch(0.985 0.006 150); font-size:12px; outline:none;">
                  <input value="{{ a.notes }}" onInput="{{ a.onNotes }}" placeholder="notes" style="flex:1.4; min-width:120px; padding:8px 10px; border-radius:8px; border:1px solid oklch(0.92 0.016 152); background:oklch(0.985 0.006 150); font-size:12px; outline:none;">
                  <span onClick="{{ a.remove }}" style="width:16px; text-align:center; cursor:pointer; color:oklch(0.66 0.03 158); font-size:14px;">✕</span>
                </div>
              </sc-for>
            </div>
          </div>
          <sc-if value="{{ noApps }}" hint-placeholder-val="{{ false }}">
            <div style="text-align:center; padding:16px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:oklch(0.58 0.03 158);">no applications yet — add one below 🌾</div>
          </sc-if>
          <div style="display:flex; gap:10px; align-items:center; margin-top:12px;">
            <input type="text" data-app-add placeholder="+ Company — Role  (Enter or Save)" onKeyDown="{{ onAddApp }}" style="flex:1; padding:11px 14px; border-radius:12px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.99 0.006 150); font-size:14px; outline:none;">
            <button onClick="{{ saveApps }}" style="cursor:pointer; padding:11px 18px; border-radius:12px; border:none; font-weight:700; font-size:13px; color:{{ saveBtnColor }}; background:{{ saveBtnBg }}; white-space:nowrap;">{{ saveBtnLabel }}</button>
          </div>
          <div style="display:flex; gap:10px; align-items:stretch; margin-top:10px;">
            <textarea data-app-import placeholder="Paste rows from a spreadsheet — one per line: Company, Role, Status, Link, Notes" style="flex:1; min-height:44px; padding:10px 12px; border-radius:12px; border:1px solid oklch(0.9 0.03 152); background:oklch(0.985 0.006 150); font-size:12px; font-family:'Space Mono',monospace; outline:none; resize:vertical;"></textarea>
            <button onClick="{{ onImportApps }}" style="cursor:pointer; padding:0 18px; border-radius:12px; border:1px solid oklch(0.84 0.06 165); background:oklch(0.96 0.03 165); color:oklch(0.4 0.1 160); font-weight:700; font-size:13px; white-space:nowrap;">Import</button>
          </div>
        </div>
        <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:22px;">
          <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:18px; letter-spacing:0.18em; color:oklch(0.4 0.1 158); margin:0 0 16px; white-space:nowrap;">🌾 p i p e l i n e</p>
          <div style="display:flex; align-items:flex-end; gap:12px; height:130px;">
            <sc-for list="{{ pipeline }}" as="s" hint-placeholder-count="6">
              <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:6px;">
                <span style="font-family:'Space Mono',monospace; font-weight:700; font-size:13px; color:oklch(0.4 0.05 158);">{{ s.count }}</span>
                <div style="width:100%; height:{{ s.barH }}; min-height:6px; border-radius:8px 8px 4px 4px; background:{{ s.color }};"></div>
                <span style="font-family:'Space Mono',monospace; font-size:9px; color:oklch(0.54 0.03 158); text-align:center;">{{ s.name }}</span>
              </div>
            </sc-for>
          </div>
        </div>
      </div>
      </sc-if>

      <!-- ============ PREP ============ -->
      <sc-if value="{{ isPrep }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; flex-direction:column; gap:20px;">
        <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:22px;">
          <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:19px; letter-spacing:0.16em; color:oklch(0.4 0.1 158); margin:0 0 16px; white-space:nowrap;">🪴 s y s t e m  d e s i g n</p>
          <div style="display:flex; flex-direction:column; gap:16px;">
            <sc-for list="{{ sysBooks }}" as="b" hint-placeholder-count="3">
              <div style="border:1px solid oklch(0.93 0.014 152); border-radius:14px; padding:14px 16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:14px; margin-bottom:8px;">
                  <span style="font-weight:600; color:oklch(0.36 0.03 158);">{{ b.title }}</span>
                  <span style="font-family:'Space Mono',monospace; font-size:12px; color:oklch(0.5 0.05 158);">{{ b.doneLabel }} · {{ b.pctLabel }}</span>
                </div>
                <div style="height:9px; border-radius:999px; background:oklch(0.92 0.02 152); overflow:hidden; margin-bottom:12px;"><div style="height:100%; width:{{ b.pctLabel }}; border-radius:999px; background:linear-gradient(90deg, oklch(0.72 0.12 165), oklch(0.62 0.12 178));"></div></div>
                <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                  <span style="font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:oklch(0.55 0.04 158);">chapters</span>
                  <input type="number" min="0" max="300" value="{{ b.chapCount }}" onChange="{{ b.onTotal }}" title="how many chapters this book has" style="width:64px; padding:7px 9px; border-radius:9px; border:1px solid oklch(0.88 0.03 152); background:oklch(0.99 0.006 150); font-size:13px; outline:none;">
                  <input type="range" min="0" max="{{ b.chapCount }}" value="{{ b.readCount }}" onInput="{{ b.onRead }}" style="flex:1; min-width:130px; cursor:pointer;">
                  <span style="font-family:'Space Mono',monospace; font-size:11.5px; color:oklch(0.46 0.06 158); white-space:nowrap;">{{ b.readLabel }}</span>
                </div>
                <sc-if value="{{ b.noChapters }}" hint-placeholder-val="{{ false }}">
                  <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13.5px; color:oklch(0.58 0.03 158); margin-top:8px;">set how many chapters this book has, then drag the slider as you read 🪴</div>
                </sc-if>
              </div>
            </sc-for>
          </div>
        </div>
        <div style="background:oklch(0.99 0.006 150); border:1px solid oklch(0.9 0.02 152); border-radius:18px; padding:22px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:19px; letter-spacing:0.18em; color:oklch(0.4 0.1 158); margin:0; white-space:nowrap;">🌿 o o d   p r a c t i c e</p>
            <span style="font-family:'Space Mono',monospace; font-size:11px; color:oklch(0.5 0.05 158);">{{ oodFrac }} mastered · {{ oodPctLabel }}</span>
          </div>
          <div style="font-size:12px; color:oklch(0.56 0.03 158); margin-bottom:14px;">click a card to cycle status · Not Started → In Progress → Done</div>
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
            <sc-for list="{{ ood }}" as="p" hint-placeholder-count="11">
              <div onClick="{{ p.cycle }}" style="cursor:pointer; padding:13px 14px; border-radius:13px; background:{{ p.bg }}; border:1px solid {{ p.border }};">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                  <span style="font-weight:600; font-size:13.5px; color:oklch(0.32 0.04 158);">{{ p.name }}</span>
                  <span style="font-family:'Space Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:0.04em; padding:3px 8px; border-radius:999px; color:#fff; background:{{ p.statusColor }};">{{ p.statusShort }}</span>
                </div>
                <div style="font-family:'Space Mono',monospace; font-size:10px; color:oklch(0.56 0.03 158);">{{ p.difficulty }}</div>
              </div>
            </sc-for>
          </div>
        </div>
      </div>
      </sc-if>

    </div>
  </div>
</div></template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <script src="config.js?v=7"></script>
  <script src="runtime.js?v=7"></script>
  <script src="data.js?v=7"></script>
  <script src="dashboard.js?v=7"></script>
  <script src="boot.js?v=7"></script>
</body>
</html>
